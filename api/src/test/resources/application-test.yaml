spring:
  datasource:
    url: jdbc:postgresql://aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require&currentSchema=nidus_test
    username: ${TEST_DB_USER}
    password: ${TEST_DB_PASSWORD}
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
      connection-timeout: 3000
      idle-timeout: 15000

  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

