spring:
  profiles:
    active:
      - local
  application:
    name: nidus
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

app:
  admin:
    email: ${ADMIN_EMAIL:admin@nidus.com}
    password: ${ADMIN_PASSWORD:}
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:dev}
    password: ${MAIL_PASSWORD:dev}
    from: ${MAIL_FROM:noreply@nidus.com}
