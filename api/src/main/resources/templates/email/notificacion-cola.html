<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Recurso disponible</title></head>
<body style="font-family: Arial, sans-serif; color: #333; padding: 20px;">
    <h2 style="color: #1565c0;">Recurso disponible</h2>
    <p>Hola, <strong th:text="${nombreUsuario}">usuario</strong>.</p>
    <p>El recurso <strong th:text="${recursoNombre}">Sala A</strong> se ha liberado y tienes una solicitud en espera.</p>
    <p>Ingresa a la plataforma para reservarlo antes de que otro lo tome.</p>
    <p style="color: #666; font-size: 12px;">Este es un mensaje automático, por favor no respondas a este correo.</p>
</body>
</html>
