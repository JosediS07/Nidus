<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold tracking-tight text-primary">Nidus</h1>
      <p class="text-sm mt-2 text-secondary">Crea tu cuenta</p>
    </div>

    <div class="card">
      <form [formGroup]="form" (ngSubmit)="enviar()" class="flex flex-col gap-5">
        <mat-form-field appearance="fill">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" />
          @if (nombreInvalido) {
            <mat-error>El nombre es obligatorio</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
          @if (emailInvalido) {
            <mat-error>Email inválido</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password" />
          @if (passwordInvalido) {
            <mat-error>Mínimo 6 caracteres</mat-error>
          }
        </mat-form-field>

        @if (error) {
          <div class="alert-danger">{{ error }}</div>
        }

        <button mat-flat-button type="submit" [disabled]="form.invalid || cargando" class="btn-solid h-11">
          {{ textoBoton }}
        </button>
      </form>

      <p class="text-center mt-6 text-sm text-secondary">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="enlace-auth">Entrar</a>
      </p>
    </div>
  </div>
</div>
