<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold tracking-tight text-primary">Nidus</h1>
      <p class="text-sm mt-2 text-secondary">Accede a tu cuenta</p>
    </div>

    <div class="card">
      <form [formGroup]="form" (ngSubmit)="enviar()" class="flex flex-col gap-5">
        <mat-form-field appearance="fill">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="ejemplo@correo.com" />
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <mat-error>Email inválido</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password" />
          @if (form.get('password')?.invalid && form.get('password')?.touched) {
            <mat-error>La contraseña es obligatoria</mat-error>
          }
        </mat-form-field>

        @if (error) {
          <div class="alert-danger">{{ error }}</div>
        }

        <button mat-flat-button type="submit" [disabled]="form.invalid || cargando" class="btn-solid h-11">
          {{ cargando ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <p class="text-center mt-6 text-sm text-secondary">
        ¿No tienes cuenta?
        <a routerLink="/register" class="enlace-auth">Regístrate</a>
      </p>
    </div>
  </div>
</div>
