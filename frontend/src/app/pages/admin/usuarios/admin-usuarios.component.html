<div class="page-container">
  <div class="flex items-center justify-between mb-6">
    <h1 class="page-title !mb-0">Usuarios</h1>
    <button mat-flat-button color="primary" (click)="abrirCrear()">+ Nuevo usuario</button>
  </div>

  <div class="card overflow-hidden !p-0">
    @if (cargando) {
      <div class="cargando">Cargando...</div>
    } @else if (error) {
      <div class="alert-danger m-4">{{ error }}</div>
    } @else {
      <div class="overflow-x-auto">
        <table class="w-full">
          <caption class="sr-only">Lista de usuarios</caption>
          <thead>
            <tr>
              <th scope="col" class="table-header text-left">ID</th>
              <th scope="col" class="table-header text-left">Nombre</th>
              <th scope="col" class="table-header text-left">Email</th>
              <th scope="col" class="table-header text-left">Rol</th>
              <th scope="col" class="table-header text-left">Registrado</th>
              <th scope="col" class="table-header text-left">Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (u of usuarios; track u.id) {
              <tr class="table-row">
                <td class="table-cell text-secondary">{{ u.id }}</td>
                <td class="table-cell font-medium">{{ u.nombre }}</td>
                <td class="table-cell">{{ u.email }}</td>
                <td class="table-cell"><span class="chip" [class.chip-primary]="u.rol === 'ADMIN'">{{ u.rol }}</span></td>
                <td class="table-cell text-secondary">{{ u.creado | date:'dd/MM/yyyy' }}</td>
                <td class="table-cell">
                  <button mat-stroked-button (click)="abrirEditar(u)" class="!mr-2">Editar</button>
                  <button mat-stroked-button (click)="confirmarEliminar(u)">Eliminar</button>
                </td>
              </tr>
            } @empty {
              <tr>
                <td colspan="6" class="table-cell text-center text-secondary">No hay usuarios</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
  </div>

    <app-paginacion [total]="total" [pagina]="pagina" etiqueta="usuarios" (cambioPagina)="cargar($event)"/>
</div>
