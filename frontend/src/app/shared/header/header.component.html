<header class="bg-white border-b border-subtle">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center gap-8">
    <a routerLink="/" class="text-xl font-bold tracking-tight no-underline text-primary">
      Nidus
    </a>

    @if (authService.getUser(); as user) {
      <nav aria-label="Navegación principal" class="hidden md:flex items-center gap-1">
        <a routerLink="/recursos" class="nav-link" routerLinkActive="nav-link-active" [routerLinkActiveOptions]="{exact: true}">Recursos</a>
        <a routerLink="/reservas" class="nav-link" routerLinkActive="nav-link-active">Mis reservas</a>
        @if (authService.isAdmin()) {
          <span class="text-sm opacity-40 select-none mx-1">|</span>
          <a routerLink="/dashboard" class="nav-link admin-nav-link" routerLinkActive="nav-link-active">Dashboard</a>
          <a routerLink="/admin/usuarios" class="nav-link admin-nav-link" routerLinkActive="nav-link-active">Usuarios</a>
          <a routerLink="/admin/recursos" class="nav-link admin-nav-link" routerLinkActive="nav-link-active">Gestión recursos</a>
          <a routerLink="/admin/reservas" class="nav-link admin-nav-link" routerLinkActive="nav-link-active">Gestión reservas</a>
          <a routerLink="/admin/cola" class="nav-link admin-nav-link" routerLinkActive="nav-link-active">Cola</a>
        }
      </nav>

      <span class="flex-1"></span>

      <div class="flex items-center gap-3">
        <a routerLink="/perfil" class="text-sm font-medium hidden sm:block text-secondary hover:underline">{{ user.nombre }}</a>
        <a routerLink="/perfil" class="avatar no-underline cursor-pointer">{{ user.nombre.charAt(0).toUpperCase() }}</a>
        <button mat-stroked-button (click)="salir()" class="!text-sm border-subtle text-secondary">
          Salir
        </button>
      </div>
    } @else {
      <span class="flex-1"></span>
      <div class="flex items-center gap-3">
        <a mat-stroked-button routerLink="/login" class="border-subtle text-secondary text-sm">Iniciar sesión</a>
        <a mat-flat-button routerLink="/register" class="btn-solid text-sm">Registrarse</a>
      </div>
    }
  </div>
</header>
