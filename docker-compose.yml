services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nidus
      POSTGRES_PASSWORD: nidus_dev
      POSTGRES_DB: nidus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nidus"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/nidus
      DB_USER: nidus
      DB_PASSWORD: nidus_dev
      JWT_SECRET: NkQ2S0hBYmNkR0ZISWpLbU1OUGRRcw==256bitsecretkey
      JWT_EXPIRATION: "86400000"
      MAIL_HOST: localhost
      MAIL_PORT: "1025"
      MAIL_USERNAME: dev
      MAIL_PASSWORD: dev
      MAIL_FROM: noreply@nidus.com
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
